server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large request bodies for PDF generation (base64 images)
    client_max_body_size 50m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gotenberg PDF proxy
    location /api/gotenberg/ {
        proxy_pass https://remax-exclusive-gotenberg.jzuuqr.easypanel.host/;
        proxy_set_header Host remax-exclusive-gotenberg.jzuuqr.easypanel.host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 50m;
    }

    # Optional: Cache control for static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
